services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./database/database.sqlite:/app/database/database.sqlite
      - ./.env:/app/.env
    environment:
      - APP_ENV=local
    restart: unless-stopped

  queue:
    build: .
    command: php artisan queue:listen --tries=1 --timeout=0
    volumes:
      - ./database/database.sqlite:/app/database/database.sqlite
      - ./.env:/app/.env
    depends_on:
      - app
    restart: unless-stopped
