version: "3.9"

services:
  bot:
    build: .
    container_name: telegram-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/bot.db
    volumes:
      - bot_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
    driver: local
